<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>密码哈希生成工具</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body class="login-body">
  <main class="login-card">
    <h1>密码哈希生成</h1>
    <p class="muted">输入新密码，复制生成结果到 assets/js/config.js 的 passwordHash。</p>
    <form class="form" id="hashForm">
      <label>
        新密码
        <input id="pwd" type="text" placeholder="输入你要设置的新密码" required />
      </label>
      <button type="submit">生成 SHA-256</button>
      <label>
        结果
        <textarea id="result" rows="5" readonly></textarea>
      </label>
    </form>
  </main>

  <script>
    async function sha256(text) {
      const data = new TextEncoder().encode(text);
      const hash = await crypto.subtle.digest("SHA-256", data);
      return [...new Uint8Array(hash)].map(b => b.toString(16).padStart(2, "0")).join("");
    }

    document.getElementById("hashForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      document.getElementById("result").value = await sha256(document.getElementById("pwd").value);
    });
  </script>
</body>
</html>
