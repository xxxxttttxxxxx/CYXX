<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>love you thousand years - 登录</title>
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>
<body class="login-body">
  <div class="login-orb orb-a"></div>
  <div class="login-orb orb-b"></div>
  <main class="login-card">
    <div class="brand-mark">♡</div>
    <p class="login-kicker">Private Love Site</p>
    <h1 id="loginTitle">love you thousand years</h1>
    <p class="muted" id="loginSubtitle">输入你们设置的账号密码进入。</p>

    <form id="loginForm" class="form">
      <label>
        账号
        <input id="username" autocomplete="username" placeholder="请输入账号" required />
      </label>
      <label>
        密码
        <input id="password" type="password" autocomplete="current-password" placeholder="请输入密码" required />
      </label>
      <button type="submit">进入我们的世界</button>
      <p id="loginMsg" class="msg"></p>
    </form>

    <p class="small-tip">这里是只给被允许的人看的小小星球。</p>
  </main>

  <script src="./assets/js/config.js"></script>
  <script src="./assets/js/auth.js"></script>
  <script>
    document.getElementById('loginTitle').textContent = SITE_CONFIG.siteTitle;
    document.getElementById('loginSubtitle').textContent = SITE_CONFIG.loginSubtitle;
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const msg = document.getElementById('loginMsg');
      msg.textContent = '';
      try {
        const ok = await login(username, password);
        if (ok) {
          location.href = './home.html';
        } else {
          msg.textContent = '账号或密码不对，再检查一下。';
        }
      } catch (err) {
        msg.textContent = '登录组件加载失败，请刷新后重试。';
        console.error(err);
      }
    });
  </script>
</body>
</html>
